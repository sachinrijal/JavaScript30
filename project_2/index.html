<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JS + CSS Clock</title>
    <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>


    <div class="clock">
        <div class="clock-face">
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand second-hand"></div>
        </div>
    </div>


    <style>
        html {
            background: #018DED url(https://unsplash.it/1500/1000?image=881&blur=5);
            background-size: cover;
            font-family: 'helvetica neue';
            text-align: center;
            font-size: 10px;
        }

        body {
            margin: 0;
            font-size: 2rem;
            display: flex;
            flex: 1;
            min-height: 100vh;
            align-items: center;
        }

        .clock {
            width: 30rem;
            height: 30rem;
            border: 20px solid white;
            border-radius: 50%;
            margin: 50px auto;
            position: relative;
            padding: 2rem;
            box-shadow:
                0 0 0 4px rgba(0, 0, 0, 0.1),
                inset 0 0 0 3px #EFEFEF,
                inset 0 0 10px black,
                0 0 10px rgba(0, 0, 0, 0.2);
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            transform: translateY(-3px);
            /* account for the height of the clock hands */
        }

        .hand {
            width: 50%;
            height: 6px;
            background: black;
            position: absolute;
            top: 50%;
            transform-origin: 100%;
            transform: rotate(90deg);
            transition: all 0.05s cubic-bezier(0.1, 2.7, 0.58, 1);
        }
    </style>

    <script>

        const second_hand = document.querySelector('.second-hand');
        const min_hand = document.querySelector('.min-hand');
        const hour_hand = document.querySelector('.hour-hand');
        const hands = document.querySelectorAll('.hand');

        const setdate = () => {

            const now = new Date()

            const seconds = now.getSeconds()
            const sec_deg = (seconds / 60) * 360;
            if (seconds !== 0) {
                second_hand.style.transform = `rotate(${sec_deg + 90}deg)`;
            }
            else {
                hands.forEach(hand => hand.style.transition = "none");
            }

            const minutes = now.getMinutes();
            const min_deg = (minutes / 60) * 360;

            if (minutes !== 0) {
                min_hand.style.transform = `rotate(${min_deg + 90}deg)`;
            }
            else{
                hand.style.transitionDuration = "0sec"
            }


            const hours = now.getHours()
            const hours_deg = (hours / 12) * 360;
            hour_hand.style.transform = `rotate(${hours_deg + 90}deg)`;

        }

        setInterval(setdate, 1000);

    </script>
</body>

</html>
